<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حاسبة المجموع الكلي والمعدل العام</title>

<link rel="stylesheet" href="style.css">

<style>

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#1565c0;
color:white;
padding:12px;
border:1px solid #ccc;
}

td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

input{
width:80px;
padding:8px;
text-align:center;
font-size:18px;
}

.totalCell{

color:#1565c0;

</style>

<div class="container">

<img src="logo.png" class="logo">

<p class="note">
